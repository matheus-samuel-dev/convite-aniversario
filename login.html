<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Login Administrativo</title>

    <link rel="stylesheet"
        href="css/style.css">

</head>

<body>

    <section class="rsvp-section">

        <div class="form-card">

            <h2>
                Área Administrativa
            </h2>

            <form id="login-form">

                <input
                    type="email"
                    id="email"
                    placeholder="E-mail"
                    required>

                <input
                    type="password"
                    id="password"
                    placeholder="Senha"
                    required>

                <button
                    type="submit"
                    class="confirm-btn">

                    Entrar

                </button>

            </form>

        </div>

    </section>

    <script
        type="module"
        src="js/auth.js">
    </script>

</body>

</html>
