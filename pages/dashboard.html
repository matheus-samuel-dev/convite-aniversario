<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard - Aniversário Vicenzo</title>

    <link rel="stylesheet" href="../css/style.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

    <section class="dashboard-container">

        <div class="dashboard-header">
            <h1>Dashboard de Presenças</h1>

            <button id="logout-btn" class="logout-btn">
                🚪 Sair
            </button>
        </div>
        <div class="stats">

            <div class="stat-card">

                <h2 id="total-confirmados">
                    0
                </h2>

                <p>
                    Confirmações
                </p>

            </div>

            <div class="stat-card">

                <h2 id="total-acompanhantes">
                    0
                </h2>

                <p>
                    Acompanhantes
                </p>

            </div>

            <div class="stat-card">

                <h2 id="total-geral">
                    0
                </h2>

                <p>
                    Total de Pessoas
                </p>

            </div>

            <div class="stat-card">

                <h2 id="taxa-presenca">
                    0%
                </h2>

                <p>
                    Taxa de Presença
                </p>

            </div>

        </div>

        <div class="card">

            <h2>
                📊 Estatísticas do Evento
            </h2>

            <canvas id="presencaChart">

            </canvas>

            <p class="chart-description">
                Visualização das confirmações, ausências e acompanhantes.
            </p>

        </div>

        <div class="card">

            <h2>
                Lista de Convidados
            </h2>

            <div class="search-container">

                <input type="text" id="search" placeholder="🔍 Pesquisar convidado...">

            </div>

            <div class="actions">

                <button id="export-btn">

                    📥 Exportar Lista de Presença

                </button>

            </div>

            <div id="guest-list">

            </div>

        </div>

    </section>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script type="module" src="../js/dashboard.js">
    </script>

</body>

</html>
